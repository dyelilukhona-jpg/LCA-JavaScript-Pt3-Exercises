<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TechConnect Developer Directory</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <nav class="navbar navbar-dark bg-dark">
      <div class="container">
        <span class="navbar-brand fw-bold fs-4">TechConnect</span>
      </div>
    </nav>

    <header class="bg-light py-5">
      <div class="container text-center">
        <h1 class="display-4">Developer Directory</h1>
        <p class="lead">Showing <span id="devCount">15</span> developers</p>
      </div>
    </header>

    <section class="py-3 bg-white border-bottom">
      <div
        class="container d-flex flex-wrap gap-3 align-items-center justify-content-between"
      >
        <input
          type="text"
          id="searchInput"
          class="form-control w-50"
          placeholder="Search by name, role, or skill..."
        />
        <button id="viewToggle" class="btn btn-outline-secondary">
          Switch to Table View
        </button>
      </div>
    </section>

    <section class="py-4 bg-light border-bottom">
      <div class="container">
        <h2 class="h4 mb-3">Add a Developer</h2>
        <div class="row g-3">
          <div class="col-md-6">
            <input
              type="text"
              id="inputName"
              class="form-control"
              placeholder="Full Name"
            />
          </div>
          <div class="col-md-6">
            <input
              type="text"
              id="inputRole"
              class="form-control"
              placeholder="Role (e.g. Frontend, Backend)"
            />
          </div>
          <div class="col-md-6">
            <input
              type="text"
              id="inputSkills"
              class="form-control"
              placeholder="Skills (comma separated)"
            />
          </div>
          <div class="col-md-6">
            <input
              type="text"
              id="inputLocation"
              class="form-control"
              placeholder="Location"
            />
          </div>
          <div class="col-12">
            <div id="formError" class="text-danger mb-2"></div>
            <button id="addDeveloper" class="btn btn-primary">
              Add Developer
            </button>
          </div>
        </div>
      </div>
    </section>

    <main class="py-5">
      <div class="container">
        <div id="cardView" class="row row-cols-1 row-cols-md-3 g-4"></div>

        <div id="tableView" class="d-none">
          <table class="table table-striped table-hover">
            <thead class="table-dark">
              <tr>
                <th>Name</th>
                <th>Role</th>
                <th>Skills</th>
                <th>Location</th>
                <th>Status</th>
              </tr>
            </thead>

            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </div>
    </main>

    <script src="main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
